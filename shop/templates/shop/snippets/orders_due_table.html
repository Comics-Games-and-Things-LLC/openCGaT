<style>
    .very_important {
        color: red !important;
    }
</style>

<table class="table">
    <tr>
        <th scope="col">Product</th>
        <th scope="col">Due Date</th>
        <th scope="col">Release Date</th>
        <th scope="col">Sold</th>
        <th scope="col">Ordered</th>
        <th scope="col">Actions</th>
    </tr>

    {% for item in orders_due_items %}
        <tr>
            <td>
                <a href="{% url  'manage_product' partner_slug=partner.slug product_slug=item.product.slug %}">
                    {{ item.product.name }}
                </a>
            </td>
            <td>
                {{ item.product.order_cutoff_for_shops_date }}
                <span class="{% if item.days_until_cutoff <= 1 %}very_important{% endif %}">
                    ({{ item.days_until_cutoff }} Days)
                </span>
            </td>
            <td> {{ item.product.release_date }}</td>
            <td> {{ item.open_item_qty }}</td>
            <td class="{% if item.open_item_qty > item.requested_qty %}very_important{% endif %}">
                {{ item.requested_qty }}
            </td>
            <td>
                <a href="{% url 'log_dist_request' partner_slug=partner.slug  product_slug=item.product.slug %}"
                   class="btn btn-primary">
                    Log Request
                </a>
            </td>
        </tr>
    {% endfor %}
</table>
